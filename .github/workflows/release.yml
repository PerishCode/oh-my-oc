name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    if: ${{ !contains(github.ref_name, '-beta.') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate stable version
        run: |
          set -eu
          cargo_version=$(sed -n 's/^version = "\(.*\)"$/\1/p' app/Cargo.toml | head -n 1)
          [ "v$cargo_version" = "${GITHUB_REF_NAME}" ] || {
            printf 'version mismatch: Cargo.toml=%s tag=%s\n' "v$cargo_version" "${GITHUB_REF_NAME}" >&2
            exit 1
          }

  build:
    if: ${{ !contains(github.ref_name, '-beta.') }}
    needs: validate
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: oh-my-oc-x86_64-unknown-linux-gnu.tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive: oh-my-oc-aarch64-apple-darwin.tar.gz
          - runner: macos-latest
            target: x86_64-apple-darwin
            archive: oh-my-oc-x86_64-apple-darwin.tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: oh-my-oc-x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Package release artifacts
        if: runner.os != 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        run: scripts/release/package.sh "${GITHUB_REF_NAME}"
      - name: Package release artifacts
        shell: pwsh
        if: runner.os == 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        run: ./scripts/release/package.ps1 "${env:GITHUB_REF_NAME}"
      - uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ github.ref_name }}/${{ matrix.archive }}
      - uses: actions/upload-artifact@v6
        if: runner.os == 'Linux'
        with:
          name: release-support-assets
          path: |
            dist/${{ github.ref_name }}/skill.zip
            dist/${{ github.ref_name }}/skill.tar.gz

  publish:
    if: ${{ !contains(github.ref_name, '-beta.') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          path: dist/${{ github.ref_name }}
          merge-multiple: true
      - name: Create checksums
        run: |
          set -eu
          cd "dist/${GITHUB_REF_NAME}"
          printf 'VERSION: %s\n' "${GITHUB_REF_NAME}" > checksums.txt
          sha256sum *.tar.gz *.zip >> checksums.txt
      - name: Accept release assets
        run: sh scripts/release/verify.sh accept "${GITHUB_REF_NAME}" "dist/${GITHUB_REF_NAME}"
      - name: Verify release archives
        run: sh scripts/release/verify.sh verify "${GITHUB_REF_NAME}" "dist/${GITHUB_REF_NAME}"
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            dist/${GITHUB_REF_NAME}/*.tar.gz \
            dist/${GITHUB_REF_NAME}/*.zip \
            dist/${GITHUB_REF_NAME}/checksums.txt \
            --title "${GITHUB_REF_NAME}" \
            --notes "${GITHUB_REF_NAME}"

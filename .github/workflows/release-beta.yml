name: Release Beta

on:
  workflow_dispatch:
    inputs:
      version:
        description: Beta version tag (for example v0.2.13-beta.1)
        required: true
        type: string
      ref:
        description: Git ref to release from
        required: true
        default: main
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - name: Validate beta version
        run: |
          set -eu
          case "${{ inputs.version }}" in
            v*-beta.*) ;;
            *)
              printf '%s\n' 'beta version must look like vX.Y.Z-beta.N' >&2
              exit 1
              ;;
          esac
          beta_base_version=$(printf '%s\n' "${{ inputs.version }}" | sed -n 's/^v\([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)-beta\.[0-9][0-9]*$/\1/p')
          [ -n "$beta_base_version" ] || {
            printf '%s\n' 'beta version must look like vX.Y.Z-beta.N' >&2
            exit 1
          }
          cargo_version=$(sed -n 's/^version = "\(.*\)"$/\1/p' app/Cargo.toml | head -n 1)
          [ "$cargo_version" = "$beta_base_version" ] || {
            printf 'version mismatch: Cargo.toml=%s beta base=%s\n' "$cargo_version" "$beta_base_version" >&2
            exit 1
          }

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: oh-my-oc-x86_64-unknown-linux-gnu.tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive: oh-my-oc-aarch64-apple-darwin.tar.gz
          - runner: macos-latest
            target: x86_64-apple-darwin
            archive: oh-my-oc-x86_64-apple-darwin.tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: oh-my-oc-x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Package release artifacts
        if: runner.os != 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        run: scripts/release/package.sh "${{ inputs.version }}"
      - name: Package release artifacts
        shell: pwsh
        if: runner.os == 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        run: ./scripts/release/package.ps1 "${{ inputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ inputs.version }}/${{ matrix.archive }}
      - uses: actions/upload-artifact@v4
        if: runner.os == 'Linux'
        with:
          name: release-support-assets
          path: |
            dist/${{ inputs.version }}/skill.zip
            dist/${{ inputs.version }}/skill.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/download-artifact@v4
        with:
          path: dist/${{ inputs.version }}
          merge-multiple: true
      - name: Create checksums
        run: |
          set -eu
          cd "dist/${{ inputs.version }}"
          printf 'VERSION: %s\n' "${{ inputs.version }}" > checksums.txt
          sha256sum *.tar.gz *.zip >> checksums.txt
      - name: Accept release assets
        run: sh scripts/release/verify.sh accept "${{ inputs.version }}" "dist/${{ inputs.version }}"
      - name: Verify release archives
        run: sh scripts/release/verify.sh verify "${{ inputs.version }}" "dist/${{ inputs.version }}"
      - name: Publish prerelease assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release create "${{ inputs.version }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${{ inputs.ref }}" \
            --prerelease \
            dist/${{ inputs.version }}/*.tar.gz \
            dist/${{ inputs.version }}/*.zip \
            dist/${{ inputs.version }}/checksums.txt \
            --title "${{ inputs.version }}" \
            --notes "${{ inputs.version }}"

  smoke:
    needs: publish
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
          - runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - name: Smoke beta install on Unix
        if: runner.os != 'Windows'
        run: sh scripts/release/smoke.sh "${{ inputs.version }}"
      - name: Smoke beta install on Windows
        shell: pwsh
        if: runner.os == 'Windows'
        run: ./scripts/release/smoke.ps1 "${{ inputs.version }}"
